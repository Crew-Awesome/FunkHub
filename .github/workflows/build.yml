name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_cmd: node ./node_modules/electron-builder/cli.js --linux AppImage --x64 --publish never && node ./node_modules/electron-builder/cli.js --linux deb --x64 --publish never
          - os: windows-latest
            artifact: FunkHub-windows
            package_cmd: node ./node_modules/electron-builder/cli.js --win nsis portable --x64 --publish never
            artifact_glob: |
              dist-desktop/**/*.exe
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap
          - os: macos-latest
            artifact: FunkHub-macos
            package_cmd: node ./node_modules/electron-builder/cli.js --mac dmg zip --publish never
            artifact_glob: |
              dist-desktop/**/*.dmg
              dist-desktop/**/*.zip
              dist-desktop/**/builder-*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build renderer
        run: bun run build:renderer

      - name: Package desktop app
        run: ${{ matrix.package_cmd }}

      - name: Verify Linux output
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          appimage_count=$(find dist-desktop -type f -name "*.AppImage" | wc -l | tr -d ' ')
          deb_count=$(find dist-desktop -type f -name "*.deb" | wc -l | tr -d ' ')
          if [[ "$appimage_count" -eq 0 ]]; then
            echo "No Linux installer (.AppImage) was produced under dist-desktop/."
            exit 1
          fi
          if [[ "$deb_count" -eq 0 ]]; then
            echo "No Linux package (.deb) was produced under dist-desktop/."
            exit 1
          fi
          find dist-desktop -type f -name "*.AppImage" -print
          find dist-desktop -type f -name "*.deb" -print

      - name: Verify Windows installer output
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-desktop -Filter *.exe -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "No Windows installers (.exe) were produced under dist-desktop/."
          }
          $files | ForEach-Object { Write-Host "Found Windows installer: $($_.FullName)" }

      - name: Verify macOS installer output
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          dmg_count=$(find dist-desktop -type f -name "*.dmg" | wc -l | tr -d ' ')
          zip_count=$(find dist-desktop -type f -name "*.zip" | wc -l | tr -d ' ')
          if [[ "$dmg_count" -eq 0 ]]; then
            echo "No macOS installer (.dmg) was produced under dist-desktop/."
            exit 1
          fi
          if [[ "$zip_count" -eq 0 ]]; then
            echo "No macOS archive (.zip) was produced under dist-desktop/."
            exit 1
          fi
          find dist-desktop -type f -name "*.dmg" -print
          find dist-desktop -type f -name "*.zip" -print

      - name: Upload build artifacts
        if: matrix.os != 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux AppImage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FunkHub-linux-appimage
          path: dist-desktop/**/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux DEB artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FunkHub-linux-deb
          path: dist-desktop/**/*.deb
          if-no-files-found: error
          retention-days: 14
