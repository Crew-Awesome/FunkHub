name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: FunkHub-linux
            package_cmd: node ./node_modules/electron-builder/cli.js --linux AppImage --x64 --publish never
            artifact_glob: |
              dist-desktop/**/*.AppImage
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap
          - os: windows-latest
            artifact: FunkHub-windows
            package_cmd: node ./node_modules/electron-builder/cli.js --win nsis portable --x64 --publish never
            artifact_glob: |
              dist-desktop/**/*.exe
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build renderer
        run: bun run build:renderer

      - name: Package desktop app
        run: ${{ matrix.package_cmd }}

      - name: Verify Linux installer output
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(dist-desktop/**/*.AppImage)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No Linux installer (.AppImage) was produced under dist-desktop/."
            exit 1
          fi
          printf 'Found Linux installer: %s\n' "${files[@]}"

      - name: Verify Windows installer output
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-desktop -Filter *.exe -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "No Windows installers (.exe) were produced under dist-desktop/."
          }
          $files | ForEach-Object { Write-Host "Found Windows installer: $($_.FullName)" }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: FunkHub-linux
          path: release-artifacts/FunkHub-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FunkHub-windows
          path: release-artifacts/FunkHub-windows

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ -n "$TAG_VERSION" ]]; then
            echo "value=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release payload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          linux=(release-artifacts/FunkHub-linux/**/*.AppImage)
          windows=(release-artifacts/FunkHub-windows/**/*.exe)
          if [[ ${#linux[@]} -eq 0 ]]; then
            echo "Release payload missing Linux AppImage installer."
            exit 1
          fi
          if [[ ${#windows[@]} -eq 0 ]]; then
            echo "Release payload missing Windows .exe installers."
            exit 1
          fi
          printf 'Linux release files: %s\n' "${linux[@]}"
          printf 'Windows release files: %s\n' "${windows[@]}"

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FunkHub v${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/FunkHub-linux/**/*.AppImage
            release-artifacts/FunkHub-windows/**/*.exe
