version: 2

updates:
  # npm / bun dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      electron:
        patterns:
          - "electron*"
          - "electron-builder*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
