name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      BUILD_CHANNEL: release
      VITE_APP_VERSION: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_cmd: node ./node_modules/electron-builder/cli.js --linux AppImage --x64 --publish never && node ./node_modules/electron-builder/cli.js --linux deb --x64 --publish never
          - os: windows-latest
            artifact: FunkHub-windows
            package_cmd: node ./node_modules/electron-builder/cli.js --win nsis portable --x64 --publish never
            artifact_glob: |
              dist-desktop/*.exe
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap
          - os: macos-latest
            artifact: FunkHub-macos
            package_cmd: node ./node_modules/electron-builder/cli.js --mac dmg zip --publish never
            artifact_glob: |
              dist-desktop/**/*.dmg
              dist-desktop/**/*.zip
              dist-desktop/**/builder-*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build renderer
        run: bun run build:renderer

      - name: Package desktop app
        run: ${{ matrix.package_cmd }}

      - name: Verify Linux output
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          appimage_count=$(find dist-desktop -type f -name "*.AppImage" | wc -l | tr -d ' ')
          deb_count=$(find dist-desktop -type f -name "*.deb" | wc -l | tr -d ' ')
          if [[ "$appimage_count" -eq 0 ]]; then
            echo "No Linux installer (.AppImage) was produced under dist-desktop/."
            exit 1
          fi
          if [[ "$deb_count" -eq 0 ]]; then
            echo "No Linux package (.deb) was produced under dist-desktop/."
            exit 1
          fi
          find dist-desktop -type f -name "*.AppImage" -print
          find dist-desktop -type f -name "*.deb" -print

      - name: Verify Windows installer output
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-desktop -Filter *.exe -File
          if ($files.Count -eq 0) {
            Write-Error "No Windows installers (.exe) were produced under dist-desktop/."
          }
          $files | ForEach-Object { Write-Host "Found Windows installer: $($_.FullName)" }

      - name: Upload build artifacts
        if: matrix.os != 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux AppImage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FunkHub-linux-appimage
          path: dist-desktop/**/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux DEB artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FunkHub-linux-deb
          path: dist-desktop/**/*.deb
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: FunkHub-linux-appimage
          path: release-artifacts/FunkHub-linux-appimage

      - name: Download Linux DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: FunkHub-linux-deb
          path: release-artifacts/FunkHub-linux-deb

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FunkHub-windows
          path: release-artifacts/FunkHub-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FunkHub-macos
          path: release-artifacts/FunkHub-macos

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ -n "$TAG_VERSION" ]]; then
            echo "value=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release payload
        shell: bash
        run: |
          set -euo pipefail
          linux_count=$(find release-artifacts/FunkHub-linux-appimage -type f -name "*.AppImage" | wc -l | tr -d ' ')
          deb_count=$(find release-artifacts/FunkHub-linux-deb -type f -name "*.deb" | wc -l | tr -d ' ')
          windows_count=$(find release-artifacts/FunkHub-windows -maxdepth 1 -type f -name "*.exe" | wc -l | tr -d ' ')
          mac_dmg_count=$(find release-artifacts/FunkHub-macos -type f -name "*.dmg" | wc -l | tr -d ' ')
          mac_zip_count=$(find release-artifacts/FunkHub-macos -type f -name "*.zip" | wc -l | tr -d ' ')
          if [[ "$linux_count" -eq 0 ]]; then
            echo "Release payload missing Linux AppImage installer."
            exit 1
          fi
          if [[ "$windows_count" -eq 0 ]]; then
            echo "Release payload missing Windows .exe installers."
            exit 1
          fi
          if [[ "$deb_count" -eq 0 ]]; then
            echo "Release payload missing Linux .deb package."
            exit 1
          fi
          if [[ "$mac_dmg_count" -eq 0 ]]; then
            echo "Release payload missing macOS .dmg installer."
            exit 1
          fi
          if [[ "$mac_zip_count" -eq 0 ]]; then
            echo "Release payload missing macOS .zip archive."
            exit 1
          fi
          find release-artifacts/FunkHub-linux-appimage -type f -name "*.AppImage" -print
          find release-artifacts/FunkHub-linux-deb -type f -name "*.deb" -print
          find release-artifacts/FunkHub-windows -maxdepth 1 -type f -name "*.exe" -print
          find release-artifacts/FunkHub-macos -type f -name "*.dmg" -print
          find release-artifacts/FunkHub-macos -type f -name "*.zip" -print

      - name: Build release asset manifest
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(
            {
              find release-artifacts/FunkHub-linux-appimage -type f -name "*.AppImage"
              find release-artifacts/FunkHub-linux-deb -type f -name "*.deb"
              find release-artifacts/FunkHub-windows -maxdepth 1 -type f -name "*.exe"
              find release-artifacts/FunkHub-macos -type f -name "*.dmg"
              find release-artifacts/FunkHub-macos -type f -name "*.zip"
            } | sort
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found after payload verification."
            exit 1
          fi

          duplicate_basenames=$(printf '%s\n' "${files[@]##*/}" | sort | uniq -d || true)
          if [[ -n "$duplicate_basenames" ]]; then
            echo "Duplicate release asset basenames detected:"
            printf '%s\n' "$duplicate_basenames"
            echo "Refusing to upload ambiguous asset names."
            exit 1
          fi

          echo "Release assets to upload:"
          printf '%s\n' "${files[@]}"

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FunkHub v${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: ${{ steps.assets.outputs.files }}
