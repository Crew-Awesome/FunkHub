name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: FunkHub-linux
            package_cmd: node ./node_modules/electron-builder/cli.js --linux AppImage --x64 --publish never
            artifact_glob: |
              dist-desktop/**/*.AppImage
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap
          - os: windows-latest
            artifact: FunkHub-windows
            package_cmd: node ./node_modules/electron-builder/cli.js --win nsis portable --x64 --publish never
            artifact_glob: |
              dist-desktop/**/*.exe
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap
          - os: macos-latest
            artifact: FunkHub-macos
            package_cmd: node ./node_modules/electron-builder/cli.js --mac dmg zip --publish never
            artifact_glob: |
              dist-desktop/**/*.dmg
              dist-desktop/**/*.zip
              dist-desktop/**/builder-*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build renderer
        run: bun run build:renderer

      - name: Package desktop app
        run: ${{ matrix.package_cmd }}

      - name: Verify Linux installer output
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(dist-desktop/**/*.AppImage)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No Linux installer (.AppImage) was produced under dist-desktop/."
            exit 1
          fi
          printf 'Found Linux installer: %s\n' "${files[@]}"

      - name: Verify Windows installer output
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-desktop -Filter *.exe -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "No Windows installers (.exe) were produced under dist-desktop/."
          }
          $files | ForEach-Object { Write-Host "Found Windows installer: $($_.FullName)" }

      - name: Verify macOS installer output
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          dmg=(dist-desktop/**/*.dmg)
          zip=(dist-desktop/**/*.zip)
          if [[ ${#dmg[@]} -eq 0 ]]; then
            echo "No macOS installer (.dmg) was produced under dist-desktop/."
            exit 1
          fi
          if [[ ${#zip[@]} -eq 0 ]]; then
            echo "No macOS archive (.zip) was produced under dist-desktop/."
            exit 1
          fi
          printf 'Found macOS DMG: %s\n' "${dmg[@]}"
          printf 'Found macOS ZIP: %s\n' "${zip[@]}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
